<footer class="footer">
	{% if page.kaiser %}
		<div class="footer__copyright">
			<span>Maintainer: <a href="https://zh-zhang.com">Zheng Zhang</a></span>
		</div>
	{% else %}
		<div class="footer__inner">
			{% include socials.html %}
			<div class="footer__copyright">
				<span>&copy; {{ 'now' | date: "%Y" }} {{ site.data.settings.basic_settings.site_title }}</span>
			</div>
		</div>
	{% endif %}

	{% if site.data.settings.advanced_settings.footer_js %}
		<!-- Extra Footer JS Code -->
		{{ site.data.settings.advanced_settings.footer_js }}
	{% endif %}

</footer>
