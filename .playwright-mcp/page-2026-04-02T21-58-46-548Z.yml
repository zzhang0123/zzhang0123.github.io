        - heading "Advanced Methods" [level=2] [ref=e31]
        - paragraph [ref=e32]: Open-source computational tools spanning polynomial emulation, Monte Carlo post-analysis, and stochastic dynamics — bridging modern numerical methods with cosmological and mathematical applications.
      - heading "Overview" [level=2] [ref=e33]
      - paragraph [ref=e34]: "This workspace brings together four independent but complementary Python packages, each addressing a different facet of computational science. From building fast, interpretable emulators for cosmological observables to performing global sensitivity analysis on Monte Carlo chains and solving Fokker-Planck equations, these tools share a common philosophy: make advanced numerical methods accessible, efficient, and scientifically transparent."
      - heading "Projects" [level=2] [ref=e35]
      - generic [ref=e36]:
        - generic [ref=e37]: Emulation
        - heading "MomentEmu" [level=3] [ref=e38]
        - paragraph [ref=e39]:
          - text: A general-purpose polynomial emulator based on
          - strong [ref=e40]: moment projection
          - text: ", introduced in"
          - link "Zhang (2025)" [ref=e41] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2507.02179
          - text: ". Given simulation data {(θ"
          - superscript [ref=e42]: (i)
          - text: ", y"
          - superscript [ref=e43]: (i)
          - text: ")}, MomentEmu constructs a moment matrix"
          - emphasis [ref=e44]: M
          - subscript [ref=e45]: αβ
          - text: and moment vector
          - emphasis [ref=e46]: ν
          - subscript [ref=e47]: α
          - text: ", then solves the linear system"
          - emphasis [ref=e48]: M c
          - text: =
          - emphasis [ref=e49]: ν
          - text: to obtain closed-form polynomial coefficients — no iterative optimisation needed.
        - paragraph [ref=e50]:
          - strong [ref=e51]: "Key properties:"
          - text: millisecond-level evaluation, negligible training cost (seconds, not hours), fully symbolic & differentiable output, forward (
          - emphasis [ref=e52]: θ → y
          - text: ) and inverse (
          - emphasis [ref=e53]: y → θ
          - text: ) modes, auto-differentiation via JAX, PyTorch, and SymPy.
        - 'img "MomentEmu workflow: data standardisation, moment matrix assembly, polynomial fitting, and model selection" [ref=e54]'
        - paragraph [ref=e55]: "The MomentEmu workflow: standardise data, assemble moment matrices, solve for polynomial coefficients, and select the optimal degree via validation RMSE."
        - link "View on GitHub →" [ref=e56] [cursor=pointer]:
          - /url: https://github.com/zzhang0123/MomentEmu
      - generic [ref=e57]:
        - generic [ref=e58]: Cosmology
        - heading "PolyCAMB — CMB Emulation with MomentEmu" [level=3] [ref=e59]
        - paragraph [ref=e60]:
          - text: Proof-of-concept application of MomentEmu to cosmological parameter estimation using
          - link "CAMB" [ref=e61] [cursor=pointer]:
            - /url: https://camb.info
          - text: ". Two emulators are provided:"
        - list [ref=e62]:
          - listitem [ref=e63]:
            - strong [ref=e64]: PolyCAMB-Dℓ
            - text: — maps six ΛCDM parameters to the CMB power spectra (TT, EE, BB, TE) at sub-percent accuracy over ℓ ≤ 4050. Training on ~47k simulations takes ~9 s; a full spectrum evaluation takes ~1.5 ms.
          - listitem [ref=e65]:
            - strong [ref=e66]: PolyCAMB-peak
            - text: — bidirectional mapping between cosmological parameters and acoustic peak features (locations & amplitudes of the first five peaks). The resulting symbolic expressions recover the known analytic dependences of peak-height ratios on Ω
            - subscript [ref=e67]: b
            - text: h², Ω
            - subscript [ref=e68]: c
            - text: h², and n
            - subscript [ref=e69]: s
            - text: .
