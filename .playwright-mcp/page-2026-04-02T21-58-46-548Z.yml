          - text: Numerical solver for the
          - strong [ref=e99]: Fokker-Planck equation
          - text: using the Kramers-Moyal expansion. Tracks the time evolution of probability density functions for stochastic processes, with built-in visualisation of PDF evolution at different time slices. Supports user-defined drift and diffusion coefficients.
