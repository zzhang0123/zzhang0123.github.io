        - heading "MCPost" [level=3] [ref=e90]
        - paragraph [ref=e91]:
          - text: Comprehensive Monte Carlo post-analysis package. Provides
          - strong [ref=e92]: global sensitivity analysis
          - text: (mutual information, distance correlation, permutation importance, GP surrogates with ARD, Sobol’ indices) and
          - strong [ref=e93]: Monte Carlo / quasi-Monte Carlo integration
          - text: with importance sampling. Modular, typed, and extensible via a registry-based plugin system.
        - link "View on GitHub →" [ref=e94] [cursor=pointer]:
          - /url: https://github.com/zzhang0123/mcpost
