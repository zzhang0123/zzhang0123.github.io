        - paragraph [ref=e32]: Open-source Python projects for 21cm intensity mapping — beam modelling, data simulation, Bayesian calibration, and power spectrum estimation
      - heading "The 21cm Challenge" [level=3] [ref=e33]
      - generic [ref=e34]:
        - img "Cosmic 21cm signal history across redshift" [ref=e36]
        - paragraph [ref=e38]: Detecting the cosmological 21cm signal from neutral hydrogen is one of the great observational challenges in modern astrophysics. The signal is buried beneath astrophysical foregrounds four to five orders of magnitude brighter, corrupted by instrumental systematics — beam chromaticity, gain drifts, correlated 1/f noise — and contaminated by radio frequency interference. Every stage of the data pipeline must be handled with care — motivating the projects presented here.
      - separator [ref=e39]
      - heading "Projects at a Glance" [level=3] [ref=e40]
      - paragraph [ref=e41]: Over the past several years I have developed a collection of Python packages that address different aspects of single-dish radio cosmology — from characterizing antenna beams to estimating power spectra. Each project is self-contained, though they naturally complement one another.
      - document [ref=e44]:
        - generic [ref=e45]:
          - generic [ref=e49]: TIBECBeam Transforms
          - generic [ref=e53]: limTODTOD Simulator
          - generic [ref=e57]: hydra-todBayesian Calibration
          - generic [ref=e61]: comatFast Toeplitz Ops
          - generic [ref=e65]: weighted QPSEPower Spectrum
          - generic [ref=e69]: MERSForeground Modelling
          - generic [ref=e73]: Global21cmSignal Emulation
      - separator [ref=e74]
      - heading "Full Stokes Beam Integration — TIBEC" [level=3] [ref=e75]
      - generic [ref=e76]:
        - img "Full Stokes antenna beam patterns (I, Q, U, V)" [ref=e78]
        - generic [ref=e79]:
          - paragraph [ref=e80]:
            - strong [ref=e81]: TIBEC
            - text: (Time Integrated Beam pattern in Equatorial Coordinates) transforms antenna far-field E-field patterns into full Stokes (I, Q, U, V) beam matrices in equatorial coordinates, with support for time integration over Local Sidereal Time.
          - list [ref=e82]:
            - listitem [ref=e83]: Reads FEKO/CST E-field data formats
            - listitem [ref=e84]: Computes Stokes beams via Pauli matrix algebra
            - listitem [ref=e85]:
              - text: "Two APIs:"
              - code [ref=e86]: E_field
              - text: (LST-based, multi-frequency) and
              - code [ref=e87]: EFieldBeamAngle
              - text: (beam-angle-based, HEALPix)
      - separator [ref=e88]
      - heading "TOD Simulation — limTOD" [level=3] [ref=e89]
      - generic [ref=e90]:
        - img "Coordinate system transformations for beam pointing" [ref=e92]
        - generic [ref=e93]:
          - paragraph [ref=e94]:
            - strong [ref=e95]: limTOD
            - text: simulates realistic time-ordered data for single-dish intensity mapping experiments such as MeerKAT/MeerKLASS. It handles asymmetric beam rotation in spherical harmonic space, sky convolution via HEALPix, and correlated 1/f gain noise generation.
          - list [ref=e96]:
            - listitem [ref=e97]: Full Stokes (I, Q, U, V) beam convolution
            - listitem [ref=e98]: "Coordinate transforms: telescope (az/el) to equatorial via ZYZYZ Euler decomposition"
            - listitem [ref=e99]:
              - text: Built-in high-pass + Wiener filter map-making (
              - code [ref=e100]: HPW_mapmaking
              - text: )
            - listitem [ref=e101]: MPI parallelization over frequencies
      - separator [ref=e102]
      - heading "Bayesian Calibration — hydra-tod" [level=3] [ref=e103]
      - generic [ref=e104]:
        - img "Reconstructed sky maps from Bayesian Gibbs sampling" [ref=e106]
        - generic [ref=e107]:
          - paragraph [ref=e108]:
            - strong [ref=e109]: hydra-tod
            - text: performs joint Bayesian inference of sky temperature maps, instrument gains, and correlated noise parameters from radio telescope time-ordered data. Using Gibbs sampling with MPI parallelization, it alternates between sampling sky, gain, and noise conditional distributions.
          - list [ref=e110]:
            - listitem [ref=e111]:
              - text: "Data model: TOD = T"
              - subscript [ref=e112]: sys
              - text: × (1 + noise) × gain
            - listitem [ref=e113]: "Three gain parameterizations: linear, log-linear, factorized"
            - listitem [ref=e114]:
              - text: Flicker noise (1/f
              - superscript [ref=e115]: α
              - text: ) covariance via incomplete gamma functions
            - listitem [ref=e116]: Polynomial emulators for ~1700× speedup of covariance evaluation
            - listitem [ref=e117]:
              - text: Published in RAS Techniques and Instruments (
              - link "arXiv:2509.10992" [ref=e118] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2509.10992
              - text: )
      - heading "Gibbs sampling for calibration, map-making, and noise estimation" [level=4] [ref=e119]
      - paragraph [ref=e120]: The Gibbs sampler alternates between four conditional updates per iteration. Steps (a)–(c) run independently per TOD on each MPI rank; step (d) synchronises the shared sky parameters across all ranks.
