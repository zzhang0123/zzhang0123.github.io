      - separator [ref=e188]
      - heading "Fast Toeplitz Operations — comat" [level=3] [ref=e189]
      - paragraph [ref=e190]:
        - text: The flicker noise covariance matrices in hydra-tod are Toeplitz-structured.
        - strong [ref=e191]: comat
        - text: provides a Cython + OpenMP implementation of the Levinson-Durbin algorithm for O(N
        - superscript [ref=e192]: "2"
        - text: ") computation of:"
      - list [ref=e193]:
        - listitem [ref=e194]:
          - strong [ref=e195]: Log-determinant
          - text: ": log|C| for the noise covariance matrix"
        - listitem [ref=e196]:
          - strong [ref=e197]: Quadratic form
          - text: ": x"
          - superscript [ref=e198]: T
          - text: C
          - superscript [ref=e199]: −1
          - text: x for likelihood evaluation
      - paragraph [ref=e200]:
        - text: These two quantities are the computational bottleneck of the noise parameter sampler. By exploiting Toeplitz structure, comat avoids the O(N
        - superscript [ref=e201]: "3"
        - text: ) cost of general matrix factorization, making the Gibbs sampler tractable for long time streams.
      - separator [ref=e202]
      - heading "Power Spectrum Estimation — weighted QPSE" [level=3] [ref=e203]
      - generic [ref=e204]:
        - img "Power spectrum mode selection and k-space coverage" [ref=e206]
        - generic [ref=e207]:
          - paragraph [ref=e208]:
            - text: The
            - strong [ref=e209]: weighted Quadratic Power Spectrum Estimator
            - text: extracts cosmological 21cm power spectra from interferometric visibility data, with principled handling of non-uniform frequency weighting caused by RFI flagging.
          - list [ref=e210]:
            - listitem [ref=e211]: Half-cosine apodization around flagged channels to minimize spectral leakage
            - listitem [ref=e212]: Comprehensive window function analysis
            - listitem [ref=e213]: Automatic noise bias correction
            - listitem [ref=e214]: Both theoretical (Gaussian) and Monte Carlo covariance estimation
      - separator [ref=e215]
      - heading "Foreground Modelling — MERS" [level=3] [ref=e216]
      - generic [ref=e217]:
        - img "Synchrotron emission mechanism — the dominant radio foreground" [ref=e219]
        - generic [ref=e220]:
          - paragraph [ref=e221]:
            - strong [ref=e222]: MERS
            - text: (Moment Expanded Radio Sky) characterizes radio foregrounds using a power-law ensemble moment expansion formalism. It enables systematic comparison of sky models (CNN-PL vs GSM), quantifies the impact of beam chromaticity and point sources on foreground subtraction, and provides foreground mitigation strategies for both global 21cm and interferometric experiments.
          - paragraph [ref=e223]:
            - text: Companion emulators in
            - strong [ref=e224]: Global21cm
            - text: (21cmVAE, Poly21cm) provide fast neural-network-based predictions of the 21cm signal for use in forecasting and analysis pipelines.
      - separator [ref=e225]
      - generic [ref=e226]:
        - heading "Key Takeaways" [level=4] [ref=e227]
        - list [ref=e228]:
          - listitem [ref=e229]:
            - strong [ref=e230]: Broad coverage
            - text: ": Python packages addressing key challenges in single-dish 21cm intensity mapping — beam transforms, TOD simulation, Bayesian calibration, map-making, power spectrum estimation, and foreground modelling."
          - listitem [ref=e231]:
            - strong [ref=e232]: Full Stokes support
            - text: ": Beam integration, TOD simulation, and map-making all handle the full polarization state (I, Q, U, V)."
          - listitem [ref=e233]:
            - strong [ref=e234]: Production-ready
            - text: ": MPI-parallelized solvers, Cython/OpenMP routines (comat), and polynomial emulators for computationally intensive operations."
          - listitem [ref=e235]:
            - strong [ref=e236]: Open-source
